# ============================================================================
# GitHub Actions CI/CD Pipeline
# 自动化测试 → 安全扫描 → Docker构建 → K8s部署
# ============================================================================

name: Qlib CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # 每周一早6点 UTC 安全扫描

env:
  PYTHON_VERSION: '3.10'
  DOCKER_REGISTRY: ghcr.io
  K8S_NAMESPACE: qlib-vpc

jobs:
  # ========================================================================
  #  1. 代码质量检查 (Lint + 类型检查 + 安全扫描)
  # ========================================================================
  lint-and-security:
    name: 🔍 Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy bandit safety

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: MyPy type check
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

      - name: Bandit security scan
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Safety dependency check
        run: safety check --full-report || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  # ========================================================================
  #  2. 单元测试 + 覆盖率
  # ========================================================================
  test:
    name: 🧪 Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-and-security
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock respx

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=src \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=term \
            --timeout=120 \
            -x \
            --ignore=tests/integration \
            -q

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage-${{ matrix.python-version }}.xml

  # ========================================================================
  #  3. 集成测试
  # ========================================================================
  integration-test:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            --tb=long \
            --timeout=300 \
            -v \
            || echo "Integration tests completed (some may require live APIs)"

  # ========================================================================
  #  4. Docker 构建 (仅 main/develop 分支)
  # ========================================================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-security, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 漏洞扫描
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ========================================================================
  #  5. K8s 清单验证
  # ========================================================================
  k8s-validate:
    name: ☸️ K8s Manifest Validation
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate K8s manifests
        run: |
          kubeconform -summary -strict \
            -ignore-missing-schemas \
            deploy/k8s/*.yaml

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: K8s dry-run deploy
        if: false  # 禁用自动部署，需手动触发
        run: |
          kubectl apply -f deploy/k8s/ --dry-run=client

  # ========================================================================
  #  6. 通知 (失败时告警)
  # ========================================================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [lint-and-security, test, integration-test, docker-build]
    if: always() && (needs.lint-and-security.result == 'failure' || needs.test.result == 'failure' || needs.docker-build.result == 'failure')
    steps:
      - name: Send failure notification
        run: |
          echo "⚠️ CI Pipeline Failed!"
          echo "Lint: ${{ needs.lint-and-security.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Docker: ${{ needs.docker-build.result }}"
